interval: 3600 # Каждые n секунд спавнится аирдроп с боссом
diapason: 5000 # Диапазон поиска локации
remove-time: 300 # Через n секунд аирдроп вместе с боссбаром удалятся
world: rtp # Мир
airdrop: # Настройка аирдропа
  block: NOTE_BLOCK # Основной блок
  stand: END_ROD # Основание для блока
  holo-closed: # Голограмма при закрытом аирдропе
    - '§7Аирдроп: §cзакрыт'
    - '§7Открытие через §e{seconds} §7сек'
  holo-opened: # Голограмма при открытом аирдропе
    - '§7Аирдроп: §aоткрыт'
bossbars: # Настройка боссбаров
  waiting-boss-kill: '§6§lАирДроп §8| §cБосс не убит §8| §bx: §7{x} §bz: §7{z}' # В ожидании убийства босса
  open-timer: '§6§lАирДроп §8| §eОткрытие через §7{seconds} §eсек §8| §bx: §7{x} §bz: §7{z}' # Ожидание таймера
  opened: '§6§lАирДроп §8| §aОткрыт §8| §bx: §7{x} §bz: §7{z}' # Открыт
bosses: # Настройка боссов
  max-distance: 10
  spider: # Босс паук
    #name: '§c§lПаук' # Можно включить если надо
    type: SPIDER
    health: 1500
    ability: # Настройка умения (спавнит паутину и пещерных пауков)
      radius: 10 # В радиусе 10 блоков
      interval: 30 # С интервалом в 30 секунд
  ocelot: # Босс оцелот
    #name: '§c§lОцелот' # Можно включить если надо
    type: OCELOT
    health: 1250
    ability: # Настройка умения (поджигает рандомного игрока)
      radius: 12 # В радиусе 12 блоков
      interval: 12 # С интервалом в 12 секунд
