# TNT - Вызывает взрыв динамита.
# CLEAN - Снимает все эффекты с игрока.
# CHANGE - Меняет при попадании игроков местами.
# AIM - Самонаводящаяся стрела.
# MIXITEMS - Меняет предметы в правой и левой руке местами.
# BLACKHOLE-N - Притягивает игроков радиусе N блоков.
# Чтобы сделать обычную стрелу, ставь в meta: ''
#
# Флаги:
#  HIDE_ATTRIBUTES, Скрывает атрибуты
#  HIDE_ENCHANTS, Скрывает зачарования
#  HIDE_POTION_EFFECTS. Скрывает эффекты зелий
#
# Эффекты:
#  https://helpch.at/docs/1.12.2/org/bukkit/potion/PotionEffectType.html
AvenowArrows:
  TNT:
    name: '&c&l◆ &f&lСТРЕЛА ВЗРЫВА'
    meta: 'TNT'
    color: '#b82525'
    lore:
      - ''
      - '&c&l⎪ &fВзрывает игрока при попадании'
      - ''
    effects:
      - 'LEVITATION,100,1'
    flags:
      - 'HIDE_POTION_EFFECTS'

  CHANGE:
    name: '&c&l◆ &f&lСТРЕЛА ОБМЕНА'
    meta: 'CHANGE'
    color: '#822eff'
    lore:
      - ''
      - '&c&l⎪ &fПри попадании меняет местами игрока и противника'
      - ''
    effects:
      - 'WITHER,100,1'
    flags:
      - 'HIDE_POTION_EFFECTS'

  CLEAR:
    name: '&c&l◆ &f&lСТРЕЛА ОЧИЩЕНИЯ'
    meta: 'CLEAR'
    color: '#FFFF00'
    lore:
      - ''
      - '&c&l⎪ &fПри попадании очищает эффекты у игрока'
      - ''
    effects:
      - 'WITHER,100,2'
    flags:
      - 'HIDE_POTION_EFFECTS'

  AIM:
    name: '&c&l◆ &f&lСТРЕЛА АИМА'
    meta: 'AIM'
    color: '#FFFF00'
    lore:
      - ''
      - '&c&l┏ &fМоментальный урон &cII'
      - '&c&l┗ &fНаводка &cII'
      - ''
    effects:
      - 'HARM,10,1'
    flags:
      - 'HIDE_POTION_EFFECTS'

  MIXITEMS:
    name: '&c&l◆ &f&lСТРЕЛА СТОРОН'
    meta: 'MIXITEMS'
    color: '#FFFF00'
    lore:
      - ''
      - '&c&l⎪ &fМеняет предметы в руках местами.'
      - ''
    effects: []
    flags:
      - 'HIDE_POTION_EFFECTS'

  BLACKHOLE:
    name: '&c&l◆ &f&lСТРЕЛА ЧЁРНОЙ ДЫРЫ'
    meta: 'BLACKHOLE-30'
    color: '#000000'
    lore:
      - ''
      - '&c&l⎪ &fПритягивает окружающих игроков в радиусе 30-и блоков.'
      - ''
    effects: []
    flags:
      - 'HIDE_POTION_EFFECTS'
  DEFAULT:
    name: '&c&l◆ &f&lОБЫЧНАЯ СТРЕЛА'
    meta: ''
    color: '#000000'
    lore:
      - ''
      - '&c&l⎪ &fДаёт скорость 2 на 10 секунд.'
      - ''
    effects:
      - 'SPEED,100,1'
    flags:
      - 'HIDE_POTION_EFFECTS'

