# The number of milliseconds per packet.
packetInMillis: 800

# 'ban' or 'kick'
action: 'kick'

# permission for command /pbf reload
reloadPermission: pbf.reload

# messages | Placeholders: %newline%
kickMessage: '&cBook edited too quickly!'
banMessage: '%newline%&cBook edited too quickly!'
reloadedMessage: '&aPlugin successfully reloaded.'
