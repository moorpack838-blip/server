    - '[message] &6 /sethome &7-&f поставить свою точку телепорта' 
    - '[message] &6 /home &7-&f телепортация на свою точку телепорта' 
    - '[message] &6 /spawn &7-&f телепорт на спавн' 
    - '[message] &6 /rtp &7-&f случайная телепортация в обычном мире' 
    - '[message] &6 /tpa &7-&f отправить запрос на телепортацию к игроку'
    - '[message] &6 /warp &7-&f публичные точки телепорта от донатеров' 
    - '[message] &6 /ingore &7-&f отправить игрока в игнор' 
    - '[message] &6 /pay &7-&f перевести монеты игроку' 
    - '[message] &6 /msg &7-&f отправить сообщение игроку' 
    - '[message] &6 /kit &7-&f дополнительные наборы с вещами' 
    - '[message] &6 /jobs &7-&f информация о работах' 
    - '[message] &6 /ah help &7-&f аукционы с товарами' 
    - '[message] &6 /titles &7-&f титулы после ника'
    - '[message] &r' 
    - '[close]'
