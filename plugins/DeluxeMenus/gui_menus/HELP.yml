  1:
    material: basehead-eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMWYxOGI5YTQzNmEyN2Y4MTNjMjg3ZWI2NzM3OWVmOGFkYmZkYzcwYWZhZjMwNGM0M2IxNjZjZTk4NmRkOCJ9fX0=
    slot: 12
    display_name: '&6&lКАК &6&lНАЧАТЬ &6&lИГРУ? &7&l[ПКМ]'
    lore:
    - ''
    - '&e&l ╔ §fНажмите, чтобы получить'
    - '&e&l ╚ §fинформацию в чате'
    - ''
    hide_enchantments: true
    hide_attributes: true
    left_click_commands:
    - '[message] &r' 
    - '[message] &fПривет, новичок! Добро пожаловать на гриферский сервер.' 
    - '[message] &fНа этом сервере игроки выживают и развиваются.' 
    - '[message] &r' 
    - '[message] &fНа сервере есть 3 мира: &aобычный&f, &cнижний &fи &5эндер&f.' 
    - '[message] &fДля того, чтобы начать выживать - пропиши &6&l/rtp' 
    - '[message] &r' 
    - '[close]'
  2:
    material: basehead-eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvYTk5MzQ5OGVhYzE5NzE1Mjg1NzEwNjdkNWIxMTBiZmU1MmIyNjkzYjYyMmEzYjY3N2FkNTcxMGYxZmEzMWNlIn19fQ==
    slot: 20
    display_name: '&6&lКАК &6&lЗАПРИВАТИТЬ &6&lРЕГИОН &7&l[ПКМ]'
    lore:
    - ''
    - '&e&l ╔ §fНажмите, чтобы получить'
    - '&e&l ╚ §fинформацию в чате'
    - ''
    hide_enchantments: true
    hide_attributes: true
    left_click_commands:
    - '[message] &r' 
    - '[message] &7 &l1.&f Пропиши команду &6//wand' 
    - '[message] &7 &l2.&f Этим деревянным топориком выдели первую точку' 
    - '[message] &f    региона левой кнопкой мыши (ЛКМ) и вторую точку' 
    - '[message] &f    правой кнопкой (ПКМ)' 
    - '[message] &7 &l3.&f Пропиши команду &6/rg claim (название)' 
    - '[message] &7 &l4.&f Не забудь поставить &6/sethome'
    - '[message] &r' 
    - '[message] &fСвои лимиты на регионы ты можешь узнать в &6/donate&f:' 
    - '[message] &fкликни на свой донат и прочитай описание для сервера &6&lГРИФ' 
    - '[message] &r' 
    - '[message] &6 /rg info [название] &7-&f получить информацию об регионе' 
    - '[message] &6 /rg list &7-&f список ваших регионов' 
    - '[message] &6 /rg remove &7-&f удалить регион' 
    - '[message] &6 /rg addowner &7-&f добавить игрока во владельцы региона'
    - '[message] &6 /rg addmember &7-&f добавить игрока в участники региона' 
    - '[message] &6 /rg removeowner &7-&f убрать владельца региона' 
    - '[message] &6 /rg removemember &7-&f убрать участника региона' 
    - '[message] &r' 
    - '[close]'
  3:
