    - '[message] &6Кит-наборы &7- &fэто дополнительные наборы вещей,' 
    - '[message] &fкоторые помогут вам с выживанием. Кит-набор можно' 
    - '[message] &fзабрать сначала один раз, после он пополнится за' 
    - '[message] &fопределённое вермя и его можно будет забрать ещё раз.' 
    - '[message] &r' 
    - '[message] &fПолучить наборы можно в меню &6/kits&f.'
    - '[message] &6Клик &lПКМ/ЛКМ &7-&f забрать набор.' 
