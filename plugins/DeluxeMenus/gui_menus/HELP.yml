    - '[message] &7 &l1. &fРаботая на спавне.' 
    - '[message] &7 &l3. &fПродавать ресурсы на аукционе. Подробнее &6/ah help' 
    - '[message] &7 &l4. &fУбивая мобов.' 
    - '[message] &r' 
    - '[message] &f Стартапы от игроков:' 
    - '[message] &7 &l1. &fСоздать клан, сделать знаменитым, собирать налоги' 
    - '[message] &f    &fза вступление или повышение.' 
    - '[message] &7 &l2. &fСтроить дома, базы под заказ' 
    - '[message] &7 &l3. &fСоздать свою качалку на мобах и продавать пропуски' 
