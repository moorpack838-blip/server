tablist-name-formatting:
  enabled: true
  anti-override: true
  disable-in-worlds:
  - disabledworld
  align-tabsuffix-on-the-right: false
  character-width-overrides: {}
scoreboard-teams:
  enabled: true
  invisible-nametags: false
  anti-override: true
  enable-collision: true
  disable-in-worlds:
  - disabledworld
  unlimited-nametag-mode:
    enabled: true
    use-marker-tag-for-1-8-x-clients: false
    disable-on-boats: true
    space-between-lines: false
    disable-in-worlds:
    - disabledworld
    dynamic-lines:
    - abovename
    - nametag
    - belowname
    - another
    static-lines:
      myCustomLine: 0.66
    disable-in-servers: []
  case-sensitive-sorting: true
  sorting-types:
  - GROUPS:vlad,razrab,admin,fakeadmin,mladmin,kyrator,builder,sponsor,stmoder,moder,sthelper,helper,yt+,yt,tiktok,dhelper,frost,wise,ares,povel,legend,gladiator,hero,elay,voin,default
  - PLACEHOLDER_A_TO_Z:%player%
  can-see-friendly-invisibles: false
yellow-number-in-tablist:
  enabled: false
  value: ''
  disable-in-worlds:
  - disabledworld
belowname-objective:
  enabled: false
  refresh-interval-ticks: 5
  number: '%health%'
  text: '&c❤'
  disable-in-worlds:
  - disabledworld
