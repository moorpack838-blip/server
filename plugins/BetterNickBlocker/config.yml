
perms:
  notify: "BetterNickBlocker.notify" # Если у игрока/привилегии будет данное право, то игрок будет получать оповещения в чат
  bypass: "BetterNickBlocker.bypass" # Если у игрока/привилегии будет данное право, то игрок сможет зайти с запрещённых ников

blocked: # Если в нике игрока будут подобное содержание то его кикает
  - "Akrein"
  - "WexCode"
  - "User"
  - "Flauncher"

reason: | # Без комментариев
  &r
  &r &7Уважаемый&7: &e{player} &7в вашем нике были замечены
  &r &cЗапрещённые символы&7, пожалуйста придумайте другой ник
  &r &1
  &r &7Если вы считаете что это была &cошибка&7, то просим вас
  &r &7Отписать в нашу группу &9Вконтакте&7: &9@WISEGRIEF
  &r &2

messages:
  notify: "&6&lＷＩＳＥ&e&lＧＵＡＲＤ &e• &fИгрок с ником&8: &e{player} &7попытался зайти на сервер"