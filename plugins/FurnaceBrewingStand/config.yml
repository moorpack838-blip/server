# Создатель плагина WinLocker - vk.com/winlocker02

furnaces:
    # Печки (Можно добавить печек сколько угодно (кастомно))
    speedfurnace:
        name: '&6&lCУПЕР &6&lПЕЧКА &7(1 УРОВЕНЬ)'
        lore:
            - '&r'
        cooktime: 2 # В 2 раза быстрее будет плавить печка
        enchant: true # Сделать чтобы печка зачарована в руке (тип зачарования будет скрыт)
    economfurnace:
        name: '&6&lСУПЕР &6&lПЕЧКА &7(2 УРОВЕНЬ)'
        lore:
            - '&r'
        burntime: 2 # В 2 раза дольше будет плавиться топливо
        enchant: true # Сделать чтобы печка зачарована в руке (тип зачарования будет скрыт)
    luckyfurnace:
        name: '&6&lСУПЕР &6&lПЕЧКА &7(3 УРОВЕНЬ)'
        lore:
            - '&r'
        result: 2 # В 2 раза больше ресуров будет приносить печка
        enchant: true # Сделать чтобы печка зачарована в руке (тип зачарования будет скрыт)
    selfurnace1:
        name: '&6&lСУПЕР &6&lПЕЧКА &7(4 УРОВЕНЬ)'
        lore:
            - '&r'
        result: 2 # В 2 раза больше ресуров будет приносить печка
        burntime: 2 # В 2 раза дольше будет плавиться топливо
        cooktime: 2 # В 2 раза быстрее будет плавить печка
        enchant: true # Сделать чтобы печка зачарована в руке (тип зачарования будет скрыт)
    selfurnace2:
        name: '&6&lСУПЕР &6&lПЕЧКА &7(5 УРОВЕНЬ)'
        lore:
            - '&r'
        result: 3 # В 2 раза больше ресуров будет приносить печка
        burntime: 3 # В 2 раза дольше будет плавиться топливо
        cooktime: 3 # В 2 раза быстрее будет плавить печка
        enchant: true # Сделать чтобы печка зачарована в руке (тип зачарования будет скрыт)

brewing-stands:
    # Стол зачарования (Можно добавить столов зачарования сколько угодно (кастомно))
    luckyBrewingStand:
        name: '&6&lСУПЕР ЗЕЛЬЕВАРКА &7(1 УРОВЕНЬ)'
        lore:
            - '&r'
        chance: 50 # 20% шанс
        enchant: true # Сделать чтобы стол зельеварка была зачарована в руке (тип зачарования будет скрыт)
    lsbrewing:
        name: '&6&lСУПЕР ЗЕЛЬЕВАРКА &7(2 УРОВЕНЬ)'
        lore:
            - '&r'
        chance: 20 # 20% шанс
        fuel-power: 1 # В 2 раза меньше топливо
        enchant: true # Сделать чтобы стол зельеварка была зачарована в руке (тип зачарования будет скрыт)  
    econombrewing:
        name: '&6&lСУПЕР ЗЕЛЬЕВАРКА &7(3 УРОВЕНЬ)'
        lore:
            - '&r'
        fuel-power: 3 # В 2 раза меньше топливо
        enchant: true # Сделать чтобы стол зельеварка была зачарована в руке (тип зачарования будет скрыт)      
messages:
    prefix: '&6&lПРЕДМЕТЫ: &f '
    no-permission: 'У вас нет прав.'
    command-notfound: 'Неизвестная команда.'
    give:
        usage: '&6/wfurnace give <игрок> <печь> &f- Выдать игроку печку'
        player-null: 'Игрок не найден.'
        furnace-null: 'Печка не найдена.'
        complete: 'Печка успешно выдана, игроку &6%player%'
    list:
        usage: '&6/wfurnace list &f- Список печей'
        title: 'Список печек:'
        format: '&c%step%&f. %name%'

messages-brewing-stand:
    prefix: '&6&lПРЕДМЕТЫ: &f '
    no-permission: 'У вас нет прав.'
    command-notfound: 'Неизвестная команда.'
    give:
        usage: '&c/brewing-stand give <игрок> <стол> &f- Выдать игроку зельеварку'
        player-null: 'Игрок не найден.'
        furnace-null: 'Стол не найден.'
        complete: 'Зельеварка успешно выдана, игроку &c%player%'
    list:
        usage: '&c/brewing-stand list &f- Список зельеварок'
        title: 'Список зельеварок:'
        format: '&c%step%&f. %name%'
            