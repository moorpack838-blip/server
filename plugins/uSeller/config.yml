    name: '§0Барыжник:'
    glass:
      enabled: true
      material: STAINED_GLASS_PANE
      data: 10
      name: ' '
    glass-closed:
      enabled: true
      material: STAINED_GLASS_PANE
      data: 14
      name: '§4✖'
  guiconfirm:
    name: '§0Подтвердите обмен:'
    glass:
      enabled: true
      material: STAINED_GLASS_PANE
      data: 10
      name: ' '
    glass-closed:
      enabled: true
      material: STAINED_GLASS_PANE
      data: 14
      name: '§4✖'
messages:
  noperm: '&7У вас недостаточно прав!'
  no-items: '&7В вашем инвентаре нет подходящих предметов!'
  sell-success: '&7Вы успешно продали предмет и получили %price%'
  not-integer: '&7В 3 аргументе должна быть стоимость товара!'
  usage-create: '&7Использование: /seller create [имя] [стоимость]'
  name-exists: '&7Данное имя предмета уже используется'
  holo-not-exists: '&7Голограмма не создана! Её нельзя переместить'
