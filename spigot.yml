# This is the main configuration file for Spigot.
# As you can see, there's tons to configure. Some options may impact gameplay, so use
# with caution, and make sure you know what each option does before configuring.
# For a reference for any variable inside this file, check out the Spigot wiki at
# http://www.spigotmc.org/wiki/spigot-configuration/
# 
# If you need help with the configuration or have any questions related to Spigot,
# join us at the IRC or drop by our forums and leave a post.
# 
# IRC: #spigot @ irc.spi.gt ( http://www.spigotmc.org/pages/irc/ )
# Forums: http://www.spigotmc.org/

config-version: 11
settings:
  save-user-cache-on-stop-only: true
  sample-count: 1
  moved-too-quickly-multiplier: 10.0
  bungeecord: false
  late-bind: true
  player-shuffle: 6000
  filter-creative-items: false
  user-cache-size: 10000
  int-cache-limit: 1024
  moved-wrongly-threshold: 0.0625
  item-dirty-ticks: 20
  timeout-time: 30
  restart-on-crash: true
  restart-script: start.sh
  netty-threads: 8
  attribute:
    maxHealth:
      max: 2048.0
    movementSpeed:
      max: 2048.0
    attackDamage:
      max: 2048.0
  debug: false
commands:
  tab-complete: -1
  log: true
  spam-exclusions: []
  silent-commandblock-console: false
  replace-commands:
  - setblock
  - summon
  - testforblock
  - tellraw
messages:
  whitelist: \n§r \n§r \n§c§lОшибка\n§fСервер закрыт на проведение технических работ.\n§fУзнать
    подробности можно в нашей группе §3§lВКонтакте\n§r \n§r \n§fЕсли вы считаете,
    что это ошибка обратитесь к администрации.
  unknown-command: '§6&lСЕРВЕР: &fКоманда не найдена.'
  server-full: \n§r \n§r \n§c§lОшибка\n§fСервер переполнен. Подключение невозможно.
    \n§r \n§r \n§fЕсли вы считаете, что это ошибка обратитесь к администрации.
  outdated-client: \n§r \n§r \n§c§lОшибка\n§fВаш клиент не соответсвует техническим
    требованиям сервера.\n§fДля подключения к серверу версия вашего клиента должна
    быть §b1.12.2 §fи выше §у\n§r \n§r \n§fЕсли вы считаете, что это ошибка обратитесь
    к администрации.
  outdated-server: n§r \n§r \n§c§lОшибка\n§fВаш клиент не соответсвует техническим
    требованиям сервера.\n§fДля подключения к серверу версия вашего клиента должна
    быть §b1.12.2 §fи выше §у\n§r \n§r \n§fЕсли вы считаете, что это ошибка обратитесь
    к администрации.
  restart: §fПерезагрузка сервера §8§o(bukkit)
advancements:
  disable-saving: false
  disabled:
  - minecraft:story/disabled
stats:
  disable-saving: false
  forced-stats: {}
